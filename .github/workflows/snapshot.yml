name: Daily snapshot
on:
  schedule:
    - cron: '5 1,7,13,19 * * *'  # 4x daily; ensures at least one snap per UTC day
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: snapshot
  cancel-in-progress: false
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Snapshot GoatCounter cumulatives
        run: python tools/snapshot_cumulative.py
      - name: Commit timeseries
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet timeseries.json; then
            git add timeseries.json
            git commit -m "snapshot: $(date -u +%Y-%m-%dT%H:%M)"
            for i in 1 2 3; do
              git push origin main && break
              git pull --rebase -X ours origin main || true
              sleep 2
            done
          fi
